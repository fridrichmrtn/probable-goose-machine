name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  static:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Cancel stale PR pushes for fast feedback, but never cancel a `main` build —
    # reviewers always need a definitive pass/fail signal on the trunk.
    concurrency:
      group: ci-static-${{ github.ref }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check .

      - name: Mypy (strict, src/gander)
        run: uv run mypy src/

      - name: Pytest (fast)
        run: uv run pytest -m fast --strict-markers -v

  openrouter-live:
    runs-on: ubuntu-latest
    # T30 Phase 1: bumped 20 -> 30 to absorb the EN-triplet acceptance suite
    # (3 added pipeline runs @ ~60s each + DDG rate-limit reruns).
    timeout-minutes: 30
    needs: static
    # Always report this check. Fork PRs cannot access secrets, so they no-op
    # successfully inside the job instead of leaving a required check missing.
    # `ci-live` lock serializes concurrent PRs/pushes — the acceptance suite still touches DDG
    # and concurrent search from one runner IP pool rate-limits.
    concurrency:
      group: ci-live
      cancel-in-progress: false
    steps:
      - name: Check OpenRouter secret
        id: openrouter-secret
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          FORK_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
        run: |
          if [ -n "$OPENROUTER_API_KEY" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "available=false" >> "$GITHUB_OUTPUT"
          if [ "$FORK_PR" = "true" ]; then
            echo "::notice::OPENROUTER_API_KEY is unavailable on fork PRs; skipping openrouter-live."
            exit 0
          fi

          echo "::error::OPENROUTER_API_KEY repository secret is required for openrouter-live"
          exit 1

      - uses: actions/checkout@v4
        if: steps.openrouter-secret.outputs.available == 'true'
        with:
          lfs: true

      - name: Set up uv
        if: steps.openrouter-secret.outputs.available == 'true'
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        if: steps.openrouter-secret.outputs.available == 'true'
        run: uv sync --frozen

      - name: Pytest (OpenRouter live)
        if: steps.openrouter-secret.outputs.available == 'true'
        env:
          GANDER_LLM_PROVIDER: openrouter
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # Exercise the production OpenRouter path end to end: PDF pages use
          # OpenRouter vision, DOCX stays deterministic, and downstream stages
          # use OpenRouter text/JSON.
          GANDER_PDF_INGEST_MODE: vision
          GANDER_DOCX_INGEST_MODE: text
        # --reruns 1 absorbs sampling + DDG variance at the anchor-survival gate;
        # one retry drops the cross-fixture flake rate from ~50% to ~10%. Applies
        # to live only — fast/slow suites must stay deterministic.
        #
        # -n 4 --dist=loadgroup parallelizes the I/O-bound async tests
        # (LLM HTTPS dominates wall time). The DDG-touching salary test carries
        # @pytest.mark.xdist_group("ddg") so loadgroup pins it to a single worker.
        run: uv run pytest -m live --strict-markers --reruns 1 --reruns-delay 2 -n 4 --dist=loadgroup -v
