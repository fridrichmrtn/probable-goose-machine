name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  static:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Cancel stale PR pushes for fast feedback, but never cancel a `main` build —
    # reviewers always need a definitive pass/fail signal on the trunk.
    concurrency:
      group: ci-static-${{ github.ref }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check .

      - name: Mypy (strict, src/jobfit)
        run: uv run mypy src/

      - name: Pytest (fast)
        run: uv run pytest -m fast --strict-markers -v

  live:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: static
    # Fork PRs cannot access secrets — skip the job entirely instead of failing on a missing key.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    # Single global queue across all refs/PRs — serialize against shared MiniMax + DDG quota.
    # `cancel-in-progress: false` keeps in-flight live runs alive when a new one queues.
    concurrency:
      group: ci-live
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --frozen

      - name: Pytest (live)
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          JOBFIT_MODEL_PROFILE: ci
        run: uv run pytest -m live --strict-markers -v
