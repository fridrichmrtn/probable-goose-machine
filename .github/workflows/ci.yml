name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  static:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Cancel stale PR pushes for fast feedback, but never cancel a `main` build —
    # reviewers always need a definitive pass/fail signal on the trunk.
    concurrency:
      group: ci-static-${{ github.ref }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check .

      - name: Mypy (strict, src/gander)
        run: uv run mypy src/

      - name: Pytest (fast)
        run: uv run pytest -m fast --strict-markers -v

  live:
    runs-on: ubuntu-latest
    # T30 Phase 1: bumped 20 -> 30 to absorb the EN-triplet acceptance suite
    # (3 added pipeline runs @ ~60s each + DDG rate-limit reruns).
    timeout-minutes: 30
    needs: static
    # Fork PRs cannot access secrets — skip the job entirely instead of failing on a missing key.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    # Single global queue across all refs/PRs — serialize against shared MiniMax + DDG quota.
    # `cancel-in-progress: false` keeps in-flight live runs alive when a new one queues.
    concurrency:
      group: ci-live
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --frozen

      - name: Pytest (live)
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          GANDER_MODEL_PROFILE: ci
          # VLM ingest is covered by fast mocked tests in this PR; T35 owns
          # spend-capped live VLM gates. Keep the acceptance suite on the
          # deterministic text tier so existing cost/anchor budgets remain stable.
          GANDER_INGEST_MODE: text
        # --reruns 1 absorbs MiniMax sampling variance at the anchor-survival gate
        # (verified-quote ratio sits near the 80% floor; one retry drops the
        # cross-fixture flake rate from ~50% to ~10%). Applies to live only —
        # fast/slow suites must stay deterministic.
        #
        # -n 4 --dist=loadgroup parallelizes the I/O-bound async tests
        # (MiniMax HTTPS dominates wall time). The DDG-touching salary test
        # carries @pytest.mark.xdist_group("ddg") so loadgroup pins it to a
        # single worker — concurrent DDG search from one runner IP rate-limits.
        run: uv run pytest -m live --strict-markers --reruns 1 --reruns-delay 2 -n 4 --dist=loadgroup -v
